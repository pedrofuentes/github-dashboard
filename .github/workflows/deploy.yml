name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus OIDC for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deploy at a time; never cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # SPA fallback: GitHub Pages serves 404.html for unknown paths, so deep
      # links such as /github-dashboard/settings resolve to the app shell.
      - name: Add SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
